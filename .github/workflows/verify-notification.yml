name: Verify Telegram notification

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      ADMIN_TOKEN: ${{ secrets.ZJMF_ADMIN_TOKEN || secrets.UPTIMER_ADMIN_TOKEN }}
      WORKER_URL: https://1mi-heyun-monitor.2590197063.workers.dev
    steps:
      - name: Verify configured Telegram delivery
        shell: bash
        run: |
          set -euo pipefail
          test -n "$ADMIN_TOKEN"
          response_file="$(mktemp)"
          status="$(curl -sS -o "$response_file" -w "%{http_code}"             -X POST             -H "Authorization: Bearer $ADMIN_TOKEN"             -H "Content-Type: application/json"             "$WORKER_URL/api/admin/notify/test")"
          cat "$response_file"
          test "$status" = "200"
